<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardBrain — Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1d1d1f;
            background: #ffffff;
            padding: 2rem 1.5rem;
            max-width: 680px;
            margin: 0 auto;
            text-align: center;
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .tagline {
            font-size: 1.1rem;
            color: #6e6e73;
            margin-bottom: 2.5rem;
        }

        .links {
            list-style: none;
            padding: 0;
        }

        .links li {
            margin-bottom: 1rem;
        }

        .links a {
            display: inline-block;
            font-size: 1.1rem;
            color: #0071e3;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border: 1px solid #e5e5e7;
            border-radius: 12px;
            width: 100%;
            max-width: 320px;
            transition: background-color 0.15s, border-color 0.15s;
        }

        .links a:hover {
            background-color: #f5f5f7;
            border-color: #d2d2d7;
        }

        .support-note {
            margin-top: 0.25rem;
            font-size: 0.95rem;
            color: #6e6e73;
        }

        .support-note a {
            color: #0071e3;
            text-decoration: none;
            overflow-wrap: anywhere;
        }

        .support-note a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e5e7;
            font-size: 0.85rem;
            color: #6e6e73;
        }
    </style>
</head>
<body>
    <div class="icon">🧠</div>
    <h1>CardBrain</h1>
    <p class="tagline">Credit card benefit tracker.</p>

    <ul class="links">
        <li><a href="privacy-policy.html">Privacy Policy</a></li>
        <li><a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">Terms of Use</a></li>
        <li><a href="mailto:cardbrain.support@gmail.com?subject=CardBrain%20Support">Email Support</a></li>
    </ul>
    <p class="support-note">
        Support email: <a href="mailto:cardbrain.support@gmail.com?subject=CardBrain%20Support">cardbrain.support@gmail.com</a>
    </p>

    <footer>
        &copy; 2026 CardBrain. All rights reserved.
